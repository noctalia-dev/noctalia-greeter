# Type Path Mode User Group Age Argument
#
# Optional convenience for systemd and opentmpfiles (same format).
# Packaging should still run setup_greeter_system.sh / ensure_greeter_paths in
# postinst — that path is portable (OpenRC, runit, …) and uses the real greetd
# session user. This drop-in hardcodes greeter:greeter; override under
# /etc/tmpfiles.d/ if your greetd user differs.
#
# State dir only (greeter.toml, appearance sync). Do not put a log file here —
# the session wrapper defaults to /tmp/noctalia-greeter-<uid>.log.
d /var/lib/noctalia-greeter 0750 greeter greeter -
